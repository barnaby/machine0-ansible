---
# =============================================================================
# Deploy Playbook
# Run this as the regular user to install packages and configure the system
# Usage: ansible-playbook -i "IP," -u barnaby playbook.yml
# =============================================================================

- hosts: all
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    install_openclaw: true
  roles:
    - role: 01-core-packages
    - role: 02-shell
    - role: 03-motd
      vars:
        motd_type: message
        motd_message_body: |
          Welcome to your new OpenClaw VM! Run this command to start the onboarding process:

          $ openclaw onboard --install-daemon

          Note: it'll take ~60s to startup the first time, don't kill the process.

  post_tasks:
    - name: Reboot the machine
      become: true
      ansible.builtin.reboot:
        reboot_timeout: 300
