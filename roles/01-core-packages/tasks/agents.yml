---
- name: Install Claude Code globally via npm
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm install -g @anthropic-ai/claude-code
  args:
    executable: /bin/bash
  register: claude_install
  changed_when: "'added' in claude_install.stdout or 'up to date' not in claude_install.stderr"

- name: Install Openclaw globally via npm
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm install -g openclaw@latest
  args:
    executable: /bin/bash
  register: openclaw_install
  changed_when: "'added' in openclaw_install.stdout or 'up to date' not in openclaw_install.stderr"
  when: install_openclaw
