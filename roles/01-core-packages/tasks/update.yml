---
- name: Wait for unattended-upgrades to finish
  become: true
  ansible.builtin.shell:
    cmd: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
  args:
    executable: /bin/bash
  changed_when: false

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  become: true
  ansible.builtin.apt:
    upgrade: dist
