---
- name: Add fastfetch PPA
  become: true
  ansible.builtin.apt_repository:
    repo: ppa:zhangsongcui3371/fastfetch
    state: present
    update_cache: true

- name: Install fastfetch
  become: true
  ansible.builtin.apt:
    name: fastfetch
    state: present

- name: Remove default Ubuntu MOTD scripts
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/update-motd.d/00-header
    - /etc/update-motd.d/10-help-text
    - /etc/update-motd.d/50-motd-news
    - /etc/update-motd.d/50-landscape-sysinfo
    - /etc/update-motd.d/90-updates-available
    - /etc/update-motd.d/91-contract-ua-esm-status
    - /etc/update-motd.d/97-overlayroot

- name: Deploy ASCII art for MOTD
  become: true
  ansible.builtin.copy:
    src: ascii.txt
    dest: /etc/neofetch-ascii.txt
    owner: root
    group: root
    mode: "0644"

- name: Deploy dynamic MOTD script
  become: true
  ansible.builtin.template:
    src: 10-machine0.j2
    dest: /etc/update-motd.d/00-machine0-header
    owner: root
    group: root
    mode: "0755"

- name: Remove static /etc/motd
  become: true
  ansible.builtin.file:
    path: /etc/motd
    state: absent
