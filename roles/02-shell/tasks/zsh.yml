---
- name: Install zsh packages
  become: true
  ansible.builtin.apt:
    name:
      - zsh
      - powerline
      - fonts-powerline
      - eza
      - chafa
      - zoxide
      - zsh-autosuggestions
      - zsh-syntax-highlighting
    state: present

- name: Check if starship is installed
  ansible.builtin.command: which starship
  register: starship_check
  changed_when: false
  failed_when: false

- name: Install starship
  become: true
  ansible.builtin.shell: |
    curl -sS https://starship.rs/install.sh | sh -s -- -y
  args:
    creates: /usr/local/bin/starship
  when: starship_check.rc != 0

- name: Set user shell to zsh
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh

- name: Copy zsh init script
  ansible.builtin.copy:
    src: init.zsh
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    mode: "0644"

- name: Create starship config directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/starship"
    state: directory
    mode: "0755"

- name: Copy starship config
  ansible.builtin.copy:
    src: starship.toml
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/starship/starship.toml"
    mode: "0644"
